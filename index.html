<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#081417">
    <meta name="description" content="Point toward the closest point on an imported GPX path.">
    <meta property="og:title" content="PathPointer">
    <meta property="og:description" content="Find the closest point on a GPX path with live distance and compass guidance.">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="stylesheet" href="./styles.css">
    <title>PathPointer</title>
  </head>
  <body>
    <main class="app-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <section class="app-card" aria-live="polite">
        <header class="topbar">
          <div>
            <p class="eyebrow"><span></span> PATH POINTER</p>
            <h1>Find your line</h1>
          </div>
          <div id="sensor-dot" class="sensor-dot" aria-label="GPS waiting">
            <span class="location-arrow">◆</span>
          </div>
        </header>

        <div class="compass-wrap">
          <div id="compass" class="compass" role="img" aria-label="Compass pointing toward the path">
            <div class="ticks"></div>
            <span class="north">N</span>
            <div id="needle" class="needle">
              <span class="needle-tip"></span>
              <span class="needle-stem"></span>
            </div>
            <div id="arrived" class="arrived" hidden><span>✓</span></div>
            <span class="hub"></span>
          </div>
        </div>

        <div class="readout">
          <p id="distance" class="distance empty">—</p>
          <p id="readout-label" class="readout-label">IMPORT A GPX PATH TO BEGIN</p>
        </div>

        <section class="control-card">
          <div id="track-row" class="track-row" hidden>
            <div class="track-icon" aria-hidden="true"><i></i><i></i><i></i></div>
            <div class="track-copy">
              <strong id="track-name"></strong>
              <span id="track-detail"></span>
            </div>
            <span class="checkmark">✓</span>
          </div>
          <input id="file-input" class="file-input" type="file" accept=".gpx,application/gpx+xml,application/xml,text/xml">
          <button id="file-button" class="primary-button" type="button">
            <span class="folder-icon" aria-hidden="true"></span>
            <span id="file-button-label">Choose GPX file</span>
          </button>
          <button id="compass-button" class="secondary-button" type="button">Enable compass</button>
        </section>

        <div id="error-card" class="error-card" hidden><span>!</span><p id="error-message"></p></div>
        <footer>
          <span id="accuracy" hidden></span>
          <span id="heading" hidden></span>
          <span id="install-hint" class="install-hint">Share → Add to Home Screen</span>
        </footer>
      </section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>

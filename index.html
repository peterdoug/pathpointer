<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#081417">
<meta name="description" content="Point toward the closest point on an imported GPX path.">
<meta property="og:title" content="PathPointer">
<meta property="og:description" content="Find the closest point on a GPX path with live distance and compass guidance.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="stylesheet" href="./styles.css">
<title>PathPointer</title>
</head>
<body>
<main class="app-shell">
<div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>
<section class="app-card" aria-live="polite">
<header class="topbar"><div><p class="eyebrow"><span></span> PATH POINTER</p><h1>Find your line</h1></div><div id="sensor-dot" class="sensor-dot" aria-label="GPS waiting"><span class="location-arrow">◆</span></div></header>
<div class="compass-wrap"><div id="compass" class="compass" role="img" aria-label="Compass pointing toward the path">
<svg id="track-view" class="track-view" viewBox="0 0 292 292" aria-hidden="true"><defs><clipPath id="track-clip"><circle cx="146" cy="146" r="132"></circle></clipPath></defs><g clip-path="url(#track-clip)"><circle id="accuracy-circle" class="accuracy-circle" cx="146" cy="146" r="0"></circle><g id="track-paths"></g><circle id="nearest-marker" class="nearest-marker" cx="146" cy="146" r="5" hidden></circle></g></svg>
<div class="ticks"></div><div id="needle" class="needle"><span class="needle-tip"></span><span class="needle-stem"></span></div><span class="center-halo" aria-hidden="true"></span><span class="center-dot" aria-hidden="true"></span>
</div></div>
<div class="readout"><p id="distance" class="distance empty">—</p><p id="readout-label" class="readout-label">IMPORT A GPX PATH TO BEGIN</p></div>
<section class="control-card"><div id="track-row" class="track-row" hidden><div class="track-icon" aria-hidden="true"><i></i><i></i><i></i></div><div class="track-copy"><strong id="track-name"></strong><span id="track-detail"></span></div><span class="checkmark">✓</span></div><input id="file-input" class="file-input" type="file" accept=".gpx,application/gpx+xml,application/xml,text/xml"><button id="file-button" class="primary-button" type="button"><span class="folder-icon" aria-hidden="true"></span><span id="file-button-label">Choose GPX file</span></button><button id="compass-button" class="secondary-button" type="button">Enable compass</button></section>
<div id="max-deviation-card" class="max-deviation-card" hidden><span class="max-deviation-label">MAX DEVIATION</span><strong id="max-deviation">—</strong></div>
<div id="error-card" class="error-card" hidden><span>!</span><p id="error-message"></p></div>
<footer><span id="accuracy" hidden></span><span id="heading" hidden></span><span id="install-hint" class="install-hint">Share → Add to Home Screen</span></footer>
</section></main>
<script src="./app.js" defer></script>
</body>
</html>
